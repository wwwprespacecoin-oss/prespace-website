<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | PreSpace-Skill</title>

<link rel="stylesheet" href="CSS/style.css">
<link rel="stylesheet" href="CSS/auth.css">
<link rel="stylesheet" href="CSS/responsive.css">

</head>

<body class="auth-page">

    <!-- Background -->
    <div class="auth-bg"></div>

    <!-- Navbar -->
    <header class="navbar">

        <a href="index.html" class="logo">
            <span class="skill">PreSpace</span>
            <span class="hack">-Skill</span>
        </a>

        <div class="auth-buttons">
            <a href="login.html" class="login-btn">Login</a>
            <a href="register.html" class="signup-btn">Sign Up</a>
        </div>

    </header>

    <!-- Login Card -->
    <main class="auth-wrapper">

        <div class="auth-card">

            <div class="auth-card-header">
                <h2>Welcome Back</h2>
                <p>Login to your PreSpace-Skill account</p>
            </div>

            <div class="auth-form">

                <!-- Email -->
                <div class="input-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="you@example.com"
                        required
                    >
                </div>

                <!-- Password -->
                <div class="input-group">

                    <label for="password">Password</label>

                    <div class="password-wrap">

                        <input
                            type="password"
                            id="password"
                            placeholder="Enter your password"
                            required
                        >

                        <button
                            type="button"
                            class="toggle-pw"
                            onclick="togglePassword('password', this)"
                        >
                            Show
                        </button>

                    </div>

                </div>

                <!-- Remember + Forgot -->
                <div class="form-meta">

                    <label class="checkbox-label">
                        <input type="checkbox">
                        Remember Me
                    </label>

                    <a href="#" class="forgot-link">
                        Forgot Password?
                    </a>

                </div>

                <!-- Login Button -->
                <button
                    class="btn-form-primary"
                    onclick="handleLogin()"
                >
                    Login
                </button>

                <!-- Divider -->
                <div class="divider">
                    <span>or</span>
                </div>

                <!-- Google Login -->
                <button class="btn-google">

                    <svg width="20" height="20" viewBox="0 0 48 48">
                        <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.84l6.1-6.1C34.36 3.09 29.45 1 24 1 14.82 1 7.07 6.48 3.64 14.22l7.1 5.52C12.4 13.67 17.73 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.14 24.5c0-1.64-.15-3.22-.43-4.75H24v9h12.44c-.54 2.9-2.18 5.36-4.65 7.01l7.1 5.52C43.18 37.13 46.14 31.3 46.14 24.5z"/>
                        <path fill="#FBBC05" d="M10.74 28.26A14.53 14.53 0 0 1 9.5 24c0-1.48.26-2.91.71-4.26l-7.1-5.52A23.94 23.94 0 0 0 0 24c0 3.86.93 7.5 2.56 10.72l8.18-6.46z"/>
                        <path fill="#34A853" d="M24 47c5.45 0 10.02-1.8 13.36-4.9l-7.1-5.52C28.54 38.22 26.4 39 24 39c-6.27 0-11.6-4.17-13.51-9.87l-8.18 6.46C5.97 43.39 14.32 47 24 47z"/>
                    </svg>

                    Continue with Google

                </button>

            </div>

            <p class="auth-switch">
                Don't have an account?
                <a href="register.html">Sign Up</a>
            </p>

        </div>

    </main>

    <script src="JS/app.js"></script>
    <script src="JS/auth.js"></script>

</body>
</html>
